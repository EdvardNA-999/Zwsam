# ============================================================
# Zeus WASM — Wrangler Configuration
# ============================================================
# Supports staging and production environments
# Secrets are managed via: wrangler secret put
# ============================================================

name = "zeus-wasm"
main = "src/index.js"
compatibility_date = "2024-02-08"
compatibility_flags = ["nodejs_compat"]

# WASM module rule — tells Wrangler to treat .wasm as compiled WASM
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# ─────────────────────────────────────────────────────────────
# Default (shared) D1 database
# ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "zeus-db"
database_id = "e40b3fde-419c-4666-934d-e61b52aa4831"
preview_database_id = "e40b3fde-419c-4666-934d-e61b52aa4831"

# ─────────────────────────────────────────────────────────────
# Staging Environment
# ─────────────────────────────────────────────────────────────
[env.staging]
name = "zeus-wasm-staging"
compatibility_date = "2024-02-08"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "zeus-db-staging"
database_id = "YOUR_STAGING_D1_DATABASE_ID"

# ─────────────────────────────────────────────────────────────
# Production Environment
# ─────────────────────────────────────────────────────────────
[env.production]
name = "zeus-wasm-production"
compatibility_date = "2024-02-08"

[[env.production.d1_databases]]
binding = "DB"
database_name = "zeus-db-production"
database_id = "YOUR_PROD_D1_DATABASE_ID"

# ─────────────────────────────────────────────────────────────
# Secrets (set via CLI, never commit values):
#
#   npx wrangler secret put CF_API_TOKEN
#   npx wrangler secret put CF_ACCOUNT_ID
#
# Per-environment:
#   npx wrangler secret put CF_API_TOKEN --env staging
#   npx wrangler secret put CF_API_TOKEN --env production
# ─────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────
# Observability
# ─────────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 0.1
